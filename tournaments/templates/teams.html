{% extends "base_admin.html" %}

{% block content %}

<div class="container-fluid">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-3">

        <h5 class="m-0">
            <i class="bi bi-people"></i> Teams
        </h5>

        <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#createTeamModal">
            + Add Team
        </button>

    </div>

    <!-- TABLE -->
    <div class="card shadow-sm">
        <div class="card-body">

            <table class="table table-hover align-middle">

                <thead class="table-dark">
                <tr>
                    <th>#</th>
                    <th>Team Name</th>
                    <th>Tournament In</th>
                    <th>Actions</th>
                </tr>
                </thead>

                <tbody>
                {% for team in teams %}
                <tr>
                    <td>{{ forloop.counter }}</td>
                    <td>{{ team.name }}</td>
                    <td>{{ team.tournament.name }}</td>

                    <td>

                        <!-- EDIT -->
                        <a href="{% url 'team_edit' team.id %}" class="btn btn-sm btn-primary">
                            <i class="bi bi-pencil"></i>
                        </a>

                        <!-- DELETE -->
                        <a href="{% url 'team_delete' team.id %}"
                           class="btn btn-sm btn-danger"
                           onclick="return confirm('Delete this team?')">
                            <i class="bi bi-trash"></i>
                        </a>

                    </td>

                </tr>
                {% empty %}
                <tr>
                    <td colspan="3" class="text-center text-muted">
                        No teams added yet
                    </td>
                </tr>
                {% endfor %}
                </tbody>

            </table>

        </div>
    </div>

</div>


<!-- ================= CREATE MODAL ================= -->
<div class="modal fade" id="createTeamModal" tabindex="-1">

    <div class="modal-dialog">

        <div class="modal-content">

            <form method="POST">
                {% csrf_token %}

                <div class="modal-header">
                    <h5 class="modal-title">Add Team</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">

                    <div class="mb-3">
                        <label>Team Name</label>
                        <input type="text" name="name" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label>Tournament Name</label>
                        <select name="tournament_id" class="form-control" required>
                            <option value="">-- Select Tournament --</option>
                            {% for t in tournaments %}
                            <option value="{{ t.id }}"> {{ t.name }} </option>
                            {% endfor %}
                        </select>
                    </div>


                </div>

                <div class="modal-footer">
                    <button class="btn btn-success w-100">
                        Save Team
                    </button>
                </div>

            </form>

        </div>

    </div>

</div>

{% endblock %}
