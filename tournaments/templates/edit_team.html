{% extends "base_admin.html" %}

{% block content %}

<div class="card p-4 shadow-sm" style="max-width:500px;margin:auto;">

    <h5 class="mb-3">
        <i class="bi bi-pencil"></i> Edit Team
    </h5>

    <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
            <label>Team Name</label>
            <input type="text" name="name" class="form-control"
                   value="{{ team.name }}" required>
        </div>
        <div class="mb-3">
            <label>Tournament Name</label>
            <select name="tournament_id" class="form-control" required>
                <option value=""> {{ team.tournament.name }}</option>
                {% for t in tournaments %}
                <option value="{{ t.id }}"> {{ t.name }}</option>
                {% endfor %}
            </select>
        </div>

        <button class="btn btn-success w-100">
            Update Team
        </button>

    </form>

</div>

{% endblock %}
