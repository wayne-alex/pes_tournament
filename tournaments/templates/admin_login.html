{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    body {
      background: #0f172a;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }

    .login-card {
      width: 100%;
      max-width: 350px;
      border-radius: 16px;
      padding: 20px;
      background: #111827;
      box-shadow: 0 8px 20px rgba(0,0,0,0.4);
    }

    .logo {
      width: 120px;
      display: block;
      margin: 0 auto 10px;
    }

    .form-control {
      background: #1f2937;
      border: none;
      color: white;
      font-size: 0.9rem;
    }

    .form-control::placeholder {
      color: #9ca3af;
    }

    .btn-success {
      background: #d4af37;
      border: none;
      color: black;
      font-weight: bold;
    }

    .btn-success:hover {
      background: #c9a227;
    }
  </style>
</head>
<body>

<div class="login-card">

  <!-- LOGO -->
  <img src="{% static 'logo.png' %}" class="logo" alt="Tournament Logo">
  <h6 class="text-center mb-3">Admin Login</h6>

  <form onsubmit="login(event)">
    <input type="text" id="username" class="form-control mb-2" placeholder="Username" required>
    <input type="password" id="password" class="form-control mb-3" placeholder="Password" required>

    <button class="btn btn-success w-100">
      <i class="bi bi-box-arrow-in-right"></i> Login
    </button>

    <p id="error" class="text-danger text-center mt-2" style="display:none;">
      Invalid credentials
    </p>
  </form>
</div>

<script>
function login(e) {
  e.preventDefault();

  const user = document.getElementById('username').value;
  const pass = document.getElementById('password').value;

  fetch("/admin_login/", {
    method: "POST",
    headers: {
      "Content-Type": "application/x-www-form-urlencoded",
    },
    body: `username=${user}&password=${pass}`
  })
  .then(res => res.json())
  .then(data => {
    if (data.success) {
      window.location.href = "/admin_dashboard/";
    } else {
      document.getElementById('error').style.display = "block";
    }
  })
  .catch(() => {
    document.getElementById('error').style.display = "block";
  });
}
</script>

</body>
</html>
