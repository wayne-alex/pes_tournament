<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tournament Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    body {
      background: #f4f6f9;
    }

    /* Desktop sidebar */
    .sidebar {
      width: 250px;
      height: 100vh;
      position: fixed;
      left: 0;
      top: 0;
      background: #111827;
      color: white;
      transition: all 0.3s ease;
    }

    .sidebar a {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #9ca3af;
      padding: 12px;
      text-decoration: none;
      border-radius: 8px;
      margin: 5px;
    }

    .sidebar a:hover {
      background: #1f2937;
      color: white;
    }

    .main {
      margin-left: 250px;
      padding: 20px;
      transition: all 0.3s ease;
    }

    /* Mobile */
    @media (max-width: 992px) {
      .sidebar {
        display: none;
      }

      .main {
        margin-left: 0;
      }
    }

    /* Topbar */
    .topbar {
      background: white;
      padding: 10px 15px;
      border-radius: 10px;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .menu-btn {
      font-size: 24px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<!-- SIDEBAR (Desktop only) -->
<div class="sidebar d-none d-lg-block">
  <div class="p-3 text-center">
    <h5>Admin Panel</h5>
  </div>

  <a href="{% url 'admin_dashboard' %}"><i class="bi bi-speedometer2"></i> Dashboard</a>
  <a href="{% url 'tournament_create' %}"><i class="bi bi-trophy"></i> Tournament</a>
  <a href="{% url 'results' %}"><i class="bi bi-clipboard-data"></i> Results</a>
</div>

<!-- MOBILE OFFCANVAS MENU -->
<div class="offcanvas offcanvas-start" tabindex="-1" id="mobileMenu">
  <div class="offcanvas-header">
    <h5 class="offcanvas-title">Menu</h5>
    <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
  </div>

  <div class="offcanvas-body">
    <a class="d-block mb-2" href="{% url 'admin_dashboard' %}">Dashboard</a>
    <a class="d-block mb-2" href="{% url 'tournament_create' %}">Tournament</a>
    <a class="d-block mb-2" href="{% url 'results' %}">Results</a>
  </div>
</div>

<!-- MAIN CONTENT -->
<div class="main">

  <!-- TOPBAR -->
  <div class="topbar">

    <!-- Mobile menu button -->
    <div class="d-lg-none">
      <i class="bi bi-list menu-btn" data-bs-toggle="offcanvas" data-bs-target="#mobileMenu"></i>
    </div>

    <h6 class="m-0">Tournament Admin</h6>

    <i class="bi bi-person-circle"></i>
  </div>

  {% block content %}
  {% endblock %}

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
