{% extends "base_admin.html" %}

{% block content %}

<div class="card p-4 shadow-sm" style="max-width:500px;margin:auto;">

  <h5 class="mb-3">
    <i class="bi bi-pencil"></i> Update Score
  </h5>

  <form method="POST">
    {% csrf_token %}

    <div class="mb-3">
      <label>{{ fixture.home_team.name }} Score</label>
      <input type="number" name="home_score" class="form-control"
             value="{{ fixture.home_score }}">
    </div>

    <div class="mb-3">
      <label>{{ fixture.away_team.name }} Score</label>
      <input type="number" name="away_score" class="form-control"
             value="{{ fixture.away_score }}">
    </div>

    <button class="btn btn-success w-100">
      Save Result
    </button>

  </form>

</div>

{% endblock %}
